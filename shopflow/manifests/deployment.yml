apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels: 
        app: product-service
    spec:
      containers:
        - name: shopflow-product
          image: hashicorp/http-echo
          args:
            - "-text"
            - "product-service response"
          ports:
            - containerPort: 5678
          envFrom:
            - configMapRef:
                name: config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: DB_PASSWORD
          resources:
            requests: 
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 130Mi
      