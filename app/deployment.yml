apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: devops-training
  name: app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: app-web:latest
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "50Mi" 
              cpu: "100m"
            limits:
              memory: "100Mi"
              cpu: "200m"    
